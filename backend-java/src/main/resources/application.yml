server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartpark?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.smartpark.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

go:
  gateway:
    url: http://localhost:8080

speaker:
  enabled: true
  base-url: http://localhost:8080
  timeout-ms: 3000
  template: "请{ownerName}业主前往{area}{spaceCode}车位停车"
